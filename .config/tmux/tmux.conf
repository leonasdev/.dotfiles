# ==============================================================================
#  Server Options
# ==============================================================================
set -s escape-time 30          # Resolve delay for the ESC key in Vim/Neovim
set -s focus-events on         # Allow terminal to pass focus events to apps inside tmux

# ==============================================================================
#  Terminal & Colors
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on    # Allow raw escape sequences (like images) to pass through

# Undercurl & Underscore Colors (Kitty protocol & Windows Terminal support)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ==============================================================================
#  Global Settings
# ==============================================================================
set -g history-limit 100000    # Boost scrollback buffer size
set -g mouse on                # Enable mouse support (scrolling, clicking, resizing)
set -g set-clipboard on        # Allow tmux to interact with the system clipboard

set -g base-index 1            # Start window indexing at 1 (instead of 0)
setw -g pane-base-index 1      # Start pane indexing at 1
set -g renumber-windows on     # Re-index windows automatically when one is closed
setw -g automatic-rename on    # Rename window automatically to reflect current program

set -g set-titles on           # Update the host terminal's title bar
set -g set-titles-string "#T"

# ==============================================================================
#  Key Bindings: Prefix & Core
# ==============================================================================
unbind C-b                     # Unbind default prefix
set -g prefix C-a              # Set prefix to Ctrl-a
bind C-a send-prefix           # Send prefix to inner session (useful for nested tmux/SSH)

# Reload config file and display a message
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# ==============================================================================
#  Key Bindings: Panes
# ==============================================================================
unbind Left
unbind Down
unbind Up
unbind Right

# Pane navigation (Vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (Repeatable)
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# Swap panes (Repeatable)
bind -r > swap-pane -D         # Swap current pane with the next one
bind -r < swap-pane -U         # Swap current pane with the previous one

# Split panes (Removed -r to prevent accidental rapid-fire splits)
bind '"' split-window -v -c "#{pane_current_path}"
bind "'" split-window -h -c "#{pane_current_path}"

# Other pane functions
bind m resize-pane -Z          # Maximize/restore current pane

# ==============================================================================
#  Key Bindings: Windows & Sessions
# ==============================================================================
bind C-c new-session                           # Create a new session
bind c   new-window -c "#{pane_current_path}"  # Create a new window (retain current dir)

bind -r C-h previous-window                    # Move to the previous window
bind -r C-l next-window                        # Move to the next window
bind Tab    last-window                        # Move to the last active window

# Swap windows
bind -r C-Left  swap-window -t -1 \; select-window -t -1
bind -r C-Right swap-window -t +1 \; select-window -t +1

# ==============================================================================
#  Key Bindings: Copy Mode
# ==============================================================================
setw -g mode-keys vi           # Use Vim keybindings in copy mode
bind Enter copy-mode           # Press Enter to enter copy mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi 'C-q' send -X begin-selection \; send -X rectangle-toggle # Visual block mode
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# ==============================================================================
#  UI & Status Line
# ==============================================================================
set -g status-interval 1       # Redraw status line every 1 second
set -g status-justify absolute-centre # Center the window list

# Core styling
set -g status-style "bg=default,fg=#999982"
set -g pane-border-style "fg=#00344d"
set -g pane-active-border-style "fg=#999982"
set -g message-style "fg=#cccca5"
set -g message-command-style "bg=#002333,fg=#cccca5"
set -g display-panes-colour "#cc5f29"        # orange (formerly colour166)
set -g display-panes-active-colour "#5ca8cc" # blue   (formerly colour33)
setw -g clock-mode-colour "#78ba8d"          # green  (formerly colour64)

# Status Left: Prefix indicator and user
# Logic: Shows session name in default color normally, turns orange when prefix is pressed
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=#cc5f29][#S],#[fg=default][#S]} #[fg=default]#(whoami)"

# Status Right: Hostname
set -g status-right-length 100
set -g status-right "[#h]"

# Window List Formatting
setw -g window-status-current-style "fg=#cc5f29,bg=default,bold"
setw -g window-status-current-format '#I:#W #[fg=#5ca8cc]#{?window_zoomed_flag,󰊓,} '
setw -g window-status-format '#I:#W #[fg=#5ca8cc]#{?window_zoomed_flag,󰊓,} '

# Bell style
set -g window-status-bell-style "fg=#caa944,bg=default,bold"


# ==============================================================================
#  Claude Code Integration
# ==============================================================================

bind space run-shell "$HOME/.config/tmux/claude.sh popup '#{window_id}' '#{pane_current_path}'"
set-hook -g window-unlinked "run-shell '$HOME/.config/tmux/claude.sh cleanup'"
